name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Build (verify)
        working-directory: backend
        run: go build ./cmd/server/

      # The following steps only run on push to main (not PRs).
      - name: Login to DO Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker login "${{ secrets.DO_REGISTRY_ENDPOINT }}" \
            -u "${{ secrets.DO_TOKEN }}" -p "${{ secrets.DO_TOKEN }}"

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          docker build -t "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:latest" .
          docker push "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:latest"

      - name: Deploy to droplet
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            docker login "${{ secrets.DO_REGISTRY_ENDPOINT }}" -u "${{ secrets.DO_TOKEN }}" -p "${{ secrets.DO_TOKEN }}"
            cd /opt/wedding
            docker compose pull backend
            docker compose up -d backend
            docker image prune -f
