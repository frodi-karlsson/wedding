name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Build (verify)
        working-directory: backend
        run: go build ./cmd/server/

      # The following step only runs on push to main (not PRs).
      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: backend
        run: |
          docker login "${{ secrets.DO_REGISTRY_ENDPOINT }}" -u "${{ secrets.DO_TOKEN }}" --password-stdin <<< "${{ secrets.DO_TOKEN }}"
          # Tag both :latest (the droplet's pull timer tracks this) and an
          # immutable :<sha> tag for rollback (docker pull ...:<sha> on the droplet).
          docker build \
            -t "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:latest" \
            -t "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:${{ github.sha }}" .
          docker push "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:latest"
          docker push "${{ secrets.DO_REGISTRY_ENDPOINT }}/wedding-backend:${{ github.sha }}"
