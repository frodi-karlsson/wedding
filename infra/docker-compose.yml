services:
  caddy:
    image: caddy:2.11-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/wedding/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    image: ${REGISTRY_SERVER}/wedding-backend:latest
    restart: unless-stopped
    env_file:
      - /opt/wedding/.env
    volumes:
      - /mnt/data:/data
    expose:
      - "8080"

volumes:
  caddy_data:
  caddy_config:
